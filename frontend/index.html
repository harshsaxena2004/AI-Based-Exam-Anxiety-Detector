<!DOCTYPE html>
<html>
<head>
<title>Anxiety Detector</title>
</head>

<body>

<h2>AI Exam Anxiety Detector</h2>

<input type="text" id="text" placeholder="Enter your feeling">

<button onclick="predict()">Check</button>

<p id="result"></p>

<script>
function predict(){
let text = document.getElementById("text").value;

if(text.includes("stress")){
document.getElementById("result").innerText="High Anxiety";
}
else{
document.getElementById("result").innerText="Low Anxiety";
}
}
</script>

</body>
</html>
